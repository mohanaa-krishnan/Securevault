<!DOCTYPE html>
<html>
    <head>
        <link rel="stylesheet" href="result.css">
        <title>
            Result
        </title>
    </head>
    <body>
    
        <div class="container2">
            <input type="text" id="passcode" name="passcode" placeholder="Enter" oninput="audit()">
           <ul class="rules">
            <li id="Length">Atleast 8 characters</li>
            <li id="upper">One uppercase letter</li>
            <li id="lower">One lowercase letter</li>
            <li id="number">One digit</li>
            <li id="special">One special character</li>
           </ul>
            <div class="metercontainer">
                <div id="meterbar">

                </div>
            </div>
            <p id="result"></p>

        </div>
        <script>
            function audit()
            {
                let score=0;
                let pass=document.getElementById("passcode").value;
                let res=document.getElementById("result");
                let meterr=document.getElementById("meterbar");

                if (pass.length === 0) {
    meterr.style.width = "0%";
    res.innerText = "";

    updateRule("Length", false);
    updateRule("upper", false);
    updateRule("lower", false);
    updateRule("number", false);
    updateRule("special", false);

    return;
}
            
               let length=pass.length>=8;
               let upper=/[A-Z]/.test(pass);
               let lower=/[a-z]/.test(pass);
               let number=/[0-9]/.test(pass);
               let special=/[!@#$%^&*()\-_+=?]/.test(pass);

               updateRule("Length",length);
               updateRule("upper",upper);
               updateRule("lower",lower);
               updateRule("number",number);
               updateRule("special",special);

               if(length) score++;
               if(upper) score++;
               if(lower) score++;
               if(number) score++;
               if(special) score++;
                
               
               if (score == 0)
                {
                    res.innerText = "";
                    meterr.style.width = "0%";
                 }
            
            else if (score<=2)
            {
               res.innerText="WEAK PASSWORD";
               meterr.style.width="40%";
                    meterr.style.backgroundColor="red";
            }
            else if (score<=4) {
                res.innerText="MID PASSWORD";
                meterr.style.width="75%";
                    meterr.style.backgroundColor="orange";                
            } else if(score==5){
                meterr.style.width="100%";
                    meterr.style.backgroundColor="green";
                res.innerText="STRONG PASSWORD";
                
            }
           
                function updateRule(id,passed)
                {
                    let rule=document.getElementById(id);

                    if(passed)
                {
                    rule.classList.add("valid");
                }
                else
                {
                    rule.classList.remove("valid");
                }
                }
            
}
        </script>
    </body>
</html>
